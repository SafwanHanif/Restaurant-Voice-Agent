<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Debs Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e0a;
    --panel:#0e140f;
    --line:#1f2e20;
    --green:#4cff8a;
    --green-dim:#2b8a52;
    --pink:#ff4ecb;
    --pink-dim:#a13585;
    --amber:#ffb347;
    --blue:#5bc0ff;
    --muted:#475a47;
    font-size:15px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -8%, #14231a 0%, var(--bg) 50%);
    color:var(--green);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    padding:0;
  }

  /* Header */
  .kitchen-header{
    border-bottom:1px solid var(--line);
    padding:14px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .kitchen-header .brand{ font-size:16px; font-weight:700; letter-spacing:1px; }
  .kitchen-header .brand span{ color:var(--green-dim); font-size:10px; font-weight:400; margin-left:10px; letter-spacing:2px; }
  .kitchen-header .live-indicator{
    display:flex; align-items:center; gap:8px;
    font-size:11px; color:var(--green-dim);
  }
  .live-indicator .dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--green); box-shadow:0 0 10px var(--green);
    animation:pulse 1.5s ease-in-out infinite;
  }
  .live-indicator .counts{ display:flex; gap:16px; }
  .live-indicator .counts .c{ text-align:center; }
  .live-indicator .counts .c .num{ font-size:16px; font-weight:700; color:var(--green); }
  .live-indicator .counts .c .lbl{ font-size:8px; letter-spacing:1px; color:var(--muted); }

  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* Lane layout */
  .lanes{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:6px;
    padding:10px 12px 20px;
    height:calc(100vh - 80px);
    min-height:0;
  }
  .lane{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .lane-header{
    padding:10px 12px 8px;
    font-size:10px;
    letter-spacing:2px;
    border-bottom:2px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .lane-header .count{ font-size:12px; color:var(--muted); }
  .lane.placed .lane-header{ border-bottom-color:var(--amber); color:var(--amber); }
  .lane.preparing .lane-header{ border-bottom-color:var(--blue); color:var(--blue); }
  .lane.ready .lane-header{ border-bottom-color:var(--green); color:var(--green); }
  .lane.completed .lane-header{ border-bottom-color:var(--muted); color:var(--muted); }

  .lane-body{
    flex:1;
    overflow-y:auto;
    padding:6px;
    scrollbar-width:thin;
    scrollbar-color:var(--line) transparent;
  }
  .lane-body:empty::after{
    content:"◆ no orders";
    display:block;
    text-align:center;
    padding:30px 10px;
    font-size:9px;
    color:var(--muted);
    letter-spacing:1px;
  }

  /* Order card */
  .card{
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:5px;
    padding:10px 12px;
    margin-bottom:6px;
    cursor:pointer;
    transition:border-color .15s, box-shadow .15s;
  }
  .card:hover{ border-color:var(--green-dim); box-shadow:0 0 8px rgba(76,255,138,0.08); }
  .card .top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
    margin-bottom:6px;
  }
  .card .top .name{ font-size:13px; font-weight:500; color:var(--green); }
  .card .top .meta{ font-size:9px; color:var(--muted); text-align:right; }
  .card .top .meta .type-badge{
    display:inline-block;
    border:1px solid var(--line);
    border-radius:8px;
    padding:1px 6px;
    font-size:8px;
    letter-spacing:0.5px;
    color:var(--green-dim);
    margin-top:3px;
  }
  .card .items{ font-size:11px; line-height:1.6; color:var(--green-dim); }
  .card .items .item{ display:flex; justify-content:space-between; gap:8px; }
  .card .items .item .qty{ color:var(--muted); min-width:28px; }
  .card .items .item .notes{
    font-size:9px; color:var(--pink-dim);
    margin-left:28px; margin-top:-2px; margin-bottom:4px;
  }
  .card .footer{
    margin-top:7px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:9px;
    color:var(--muted);
  }
  .card .footer .advance-hint{ color:var(--green-dim); }

  /* Responsive */
  @media (max-width:820px) {
    .lanes{ grid-template-columns:repeat(2, 1fr); height:auto; }
  }
  @media (max-width:500px) {
    .lanes{ grid-template-columns:1fr; }
    .kitchen-header{ flex-direction:column; text-align:center; }
  }

  /* Toast notification */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--green);
    border-radius:6px; padding:10px 18px;
    font-size:11px; color:var(--green);
    opacity:0; transition:opacity .3s;
    pointer-events:none;
    z-index:100;
  }
  .toast.show{ opacity:1; }

  .empty-state{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; min-height:200px;
    color:var(--muted); font-size:11px; letter-spacing:1px; text-align:center;
    padding:20px;
  }
  .empty-state .big{ font-size:30px; margin-bottom:10px; opacity:0.3; }

  /* ---- Order detail modal ---- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:200; opacity:0; pointer-events:none;
    transition:opacity .2s;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }

  .modal{
    background:var(--panel); border:2px solid var(--line); border-radius:10px;
    width:100%; max-width:420px; max-height:90vh;
    display:flex; flex-direction:column;
    transform:translateY(10px); transition:transform .2s;
  }
  .modal-overlay.open .modal{ transform:translateY(0); }

  .modal-header{
    padding:14px 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-header .mtitle{ font-size:12px; font-weight:500; }
  .modal-header .mclose{
    background:none; border:none; color:var(--pink-dim);
    font-family:'JetBrains Mono',monospace; font-size:14px; cursor:pointer;
    padding:0 4px; line-height:1;
  }
  .modal-header .mclose:hover{ color:var(--pink); }

  .modal-body{
    padding:14px 18px;
    overflow-y:auto;
    font-size:12px; line-height:1.7;
  }
  .modal-body .field{ margin-bottom:10px; }
  .modal-body .field .flbl{ font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:2px; }
  .modal-body .field .fval{ color:var(--green); }
  .modal-body .field .fval.phone{ color:var(--green-dim); }

  .modal-body .modal-items{ margin:8px 0 12px; }
  .modal-body .modal-items .mi{
    display:flex; justify-content:space-between;
    padding:3px 0; border-bottom:1px dotted rgba(31,46,32,0.4);
  }
  .modal-body .modal-items .mi:last-child{ border:none; }

  .modal-body select{
    width:100%; padding:8px 6px;
    background:var(--bg); border:1px solid var(--line); border-radius:5px;
    color:var(--green); font-family:'JetBrains Mono',monospace; font-size:12px;
    outline:none; cursor:pointer;
  }
  .modal-body select:focus{ border-color:var(--green-dim); }
  .modal-body select option{ background:var(--bg); color:var(--green); }

  .modal-footer{
    padding:12px 18px 16px;
    border-top:1px solid var(--line);
    display:flex; gap:8px; justify-content:flex-end;
  }
  .modal-footer button{
    font-family:'JetBrains Mono',monospace; font-size:10px;
    padding:7px 14px; border-radius:5px; cursor:pointer;
    border:1px solid var(--line); background:var(--bg); color:var(--green-dim);
    transition:background .15s, color .15s, border-color .15s;
  }
  .modal-footer button:hover{ border-color:var(--green-dim); color:var(--green); }
  .modal-footer button.btn-danger{ color:var(--pink-dim); border-color:var(--pink-dim); }
  .modal-footer button.btn-danger:hover{ background:var(--pink-dim); color:var(--bg); }
  .modal-footer button.btn-primary{ background:var(--green); color:var(--bg); border-color:var(--green); }
  .modal-footer button.btn-primary:hover{ background:var(--green-dim); }
</style>
</head>
<body>

<div class="kitchen-header">
  <div class="brand">
    DEBS <span>KITCHEN DASHBOARD</span>
  </div>
  <div class="live-indicator">
    <span class="dot"></span>
    <span>LIVE</span>
    <span style="color:var(--muted);font-size:9px;" id="clock"></span>
    <span class="counts" id="headerCounts"></span>
  </div>
</div>

<div class="lanes" id="lanes">
  <div class="lane placed">
    <div class="lane-header">PLACED <span class="count" id="count-placed">0</span></div>
    <div class="lane-body" id="lane-placed"></div>
  </div>
  <div class="lane preparing">
    <div class="lane-header">PREPARING <span class="count" id="count-preparing">0</span></div>
    <div class="lane-body" id="lane-preparing"></div>
  </div>
  <div class="lane ready">
    <div class="lane-header">READY <span class="count" id="count-ready">0</span></div>
    <div class="lane-body" id="lane-ready"></div>
  </div>
  <div class="lane completed">
    <div class="lane-header">COMPLETED <span class="count" id="count-completed">0</span></div>
    <div class="lane-body" id="lane-completed"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Order detail modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="mtitle" id="modalTitle">ORDER DETAIL</span>
      <button class="mclose" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- populated by JS -->
    </div>
    <div class="modal-footer" id="modalFooter">
      <button class="btn-danger" id="modalCancel">CANCEL ORDER</button>
      <button id="modalSave" class="btn-primary">SAVE</button>
    </div>
  </div>
</div>

<script>
const STATUS_LANES = ['placed', 'preparing', 'ready', 'completed'];
const STATUS_FLOW = ['placed', 'preparing', 'ready', 'completed', 'cancelled'];

const lanes = {};
STATUS_LANES.forEach(s => { lanes[s] = document.getElementById('lane-' + s); });

let allOrders = []; // cache for modal
let currentModalOrder = null;

function clock(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }
setInterval(clock, 30000); clock();

async function fetchOrders(){
  try {
    const res = await fetch('/api/admin/orders');
    const data = await res.json();
    allOrders = data.orders || [];
    renderOrders(allOrders);
  } catch(e){ console.error('fetch failed', e); }
}

function renderOrders(orders){
  const bucketed = { placed: [], preparing: [], ready: [], completed: [] };
  orders.forEach(o => {
    if (bucketed[o.status]) bucketed[o.status].push(o);
    else bucketed.completed.push(o);
  });

  STATUS_LANES.forEach(status => {
    const list = bucketed[status];
    document.getElementById('count-' + status).textContent = list.length;
    lanes[status].innerHTML = list.map(o => cardHtml(o, status)).join('');
  });

  const active = orders.filter(o => o.status !== 'completed' && o.status !== 'cancelled');
  const total = orders.length;
  document.getElementById('headerCounts').innerHTML =
    `<div class="c"><div class="num">${active.length}</div><div class="lbl">ACTIVE</div></div>` +
    `<div class="c"><div class="num">${total}</div><div class="lbl">TOTAL</div></div>`;
}

function cardHtml(order, currentStatus){
  const itemsHtml = order.items.map(i => {
    const note = i.special_instructions
      ? `<div class="notes">↳ ${esc(i.special_instructions)}</div>` : '';
    return `<div class="item"><span><span class="qty">${i.quantity}×</span>${esc(i.name)}</span><span>$${(i.unit_price * i.quantity).toFixed(2)}</span></div>${note}`;
  }).join('');

  const ago = timeAgo(order.created_at);
  const typeLabel = order.order_type === 'delivery' ? 'DELIVERY' : 'PICKUP';

  return `<div class="card" data-id="${order.id}" data-status="${currentStatus}">
    <div class="top">
      <div class="name">${esc(order.customer_name)}</div>
      <div class="meta">
        <div>#${esc(order.short_id)}</div>
        <span class="type-badge">${typeLabel}</span>
      </div>
    </div>
    <div class="items">${itemsHtml}</div>
    <div class="footer">
      <span>${ago}</span>
      <span class="advance-hint">← click to edit</span>
    </div>
  </div>`;
}

function timeAgo(iso){
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (diff < 1) return 'just now';
  if (diff === 1) return '1 min ago';
  if (diff < 60) return diff + ' min ago';
  const h = Math.floor(diff / 60);
  return h + 'h ' + (diff % 60) + 'm ago';
}

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ---- Modal ----
const modalOverlay = document.getElementById('modalOverlay');
const modalBody = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');
const modalClose = document.getElementById('modalClose');
const modalSave = document.getElementById('modalSave');
const modalCancelBtn = document.getElementById('modalCancel');

function openModal(orderId){
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;
  currentModalOrder = order;

  const itemsHtml = order.items.map(i =>
    `<div class="mi">
      <span>${i.quantity}× ${esc(i.name)}</span>
      <span style="color:var(--muted)">$${(i.unit_price * i.quantity).toFixed(2)}</span>
    </div>`
  ).join('');

  const statusOpts = STATUS_FLOW.map(s =>
    `<option value="${s}" ${s === order.status ? 'selected' : ''}>${s.toUpperCase()}</option>`
  ).join('');

  modalTitle.textContent = `#${order.short_id} · ${esc(order.customer_name)}`;
  modalBody.innerHTML = `
    <div class="field">
      <div class="flbl">CUSTOMER</div>
      <div class="fval">${esc(order.customer_name)}</div>
    </div>
    <div class="field">
      <div class="flbl">PHONE</div>
      <div class="fval phone">${esc(order.phone_number)}</div>
    </div>
    <div class="field">
      <div class="flbl">TYPE</div>
      <div class="fval">${order.order_type.toUpperCase()}</div>
    </div>
    <div class="field">
      <div class="flbl">ITEMS</div>
      <div class="modal-items">${itemsHtml}</div>
    </div>
    <div class="field" style="margin-top:12px">
      <div class="flbl">STATUS</div>
      <select id="statusSelect">${statusOpts}</select>
    </div>
  `;

  modalOverlay.classList.add('open');
}

function closeModal(){
  modalOverlay.classList.remove('open');
  currentModalOrder = null;
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

modalSave.addEventListener('click', async () => {
  if (!currentModalOrder) return;
  const select = document.getElementById('statusSelect');
  if (!select) return;
  const newStatus = select.value;

  try {
    const res = await fetch(`/api/admin/orders/${currentModalOrder.id}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status: newStatus }),
    });
    const data = await res.json();
    if (data.success){
      showToast(`#${currentModalOrder.short_id} → ${newStatus.toUpperCase()}`);
      closeModal();
      fetchOrders();
    }
  } catch(e){ console.error(e); }
});

modalCancelBtn.addEventListener('click', async () => {
  if (!currentModalOrder) return;
  if (!confirm(`Cancel order #${currentModalOrder.short_id} for ${currentModalOrder.customer_name}?`)) return;

  try {
    const res = await fetch(`/api/admin/orders/${currentModalOrder.id}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status: 'cancelled' }),
    });
    const data = await res.json();
    if (data.success){
      showToast(`#${currentModalOrder.short_id} CANCELLED`);
      closeModal();
      fetchOrders();
    }
  } catch(e){ console.error(e); }
});

// Click card -> open modal
document.getElementById('lanes').addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  openModal(card.dataset.id);
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 2500);
}

// Poll
fetchOrders();
setInterval(fetchOrders, 8000);
</script>
</body>
</html>
