<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Online — Debs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e0a;
    --panel:#0e140f;
    --panel-raised:#131b13;
    --line:#1f2e20;
    --green:#4cff8a;
    --green-dim:#2b8a52;
    --pink:#ff4ecb;
    --pink-dim:#a13585;
    --amber:#ffb347;
    --blue:#5bc0ff;
    --muted:#475a47;
    --paper:#eef0e6;
    --paper-ink:#14210f;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:radial-gradient(ellipse at 50% -6%, #14231a 0%, var(--bg) 55%);
    color:var(--green);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  .pixel{font-family:'Press Start 2P',monospace}

  .page{width:100%;max-width:600px;}

  /* Header */
  .hdr{
    display:flex;justify-content:space-between;align-items:center;
    padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:16px;
    flex-wrap:wrap;gap:8px;
  }
  .hdr .brand{font-size:14px;font-weight:700;letter-spacing:1px;}
  .hdr .brand span{font-size:9px;color:var(--green-dim);font-weight:400;margin-left:6px;letter-spacing:2px;}
  .cart-icon{
    font-size:10px;color:var(--green-dim);cursor:pointer;
    border:1px solid var(--line);border-radius:16px;
    padding:4px 10px;transition:all .15s;
    display:flex;align-items:center;gap:4px;
  }
  .cart-icon:hover{border-color:var(--green-dim);color:var(--green);}
  .cart-icon .badge{
    background:var(--pink-dim);color:var(--bg);border-radius:8px;
    padding:1px 6px;font-size:8px;font-weight:700;
  }

  /* Category tabs */
  .cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:thin;}
  .cat-tab{
    flex-shrink:0;padding:6px 12px;font-size:9px;letter-spacing:1px;
    border:1px solid var(--line);border-radius:16px;cursor:pointer;
    background:var(--panel);color:var(--green-dim);
    transition:all .15s;
  }
  .cat-tab:hover{border-color:var(--green-dim);color:var(--green);}
  .cat-tab.active{background:var(--green);color:var(--bg);border-color:var(--green);}

  /* Menu items */
  .items{display:flex;flex-direction:column;gap:6px;margin-bottom:30px;}

  .mitem{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
  }
  .mitem .minfo{flex:1;min-width:0;}
  .mitem .mname{font-size:12px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
  .mitem .mdesc{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mitem .mtags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
  .mitem .mtag{font-size:7px;border:1px solid var(--line);border-radius:8px;padding:1px 5px;color:var(--green-dim);}
  .mitem .mprice{font-size:14px;font-weight:500;white-space:nowrap;}
  .mitem .add-btn{
    background:var(--line);border:none;border-radius:6px;
    padding:6px 10px;font-size:16px;cursor:pointer;color:var(--bg);line-height:1;
    font-family:'JetBrains Mono',monospace;
    transition:background .15s;white-space:nowrap;
  }
  .mitem .add-btn:hover{background:var(--green);}
  .mitem .add-btn:active{transform:scale(.95);}
  .mitem .qty-ctl{display:flex;align-items:center;gap:6px;}
  .mitem .qty-ctl button{
    width:28px;height:28px;border-radius:50%;
    border:1px solid var(--line);background:var(--bg);
    color:var(--green);cursor:pointer;font-size:14px;line-height:1;
    font-family:'JetBrains Mono',monospace;
    transition:all .15s;
  }
  .mitem .qty-ctl button:hover{border-color:var(--green-dim);background:var(--panel-raised);}
  .mitem .qty-ctl .qty{min-width:18px;text-align:center;font-size:13px;color:var(--green);}

  /* Cart drawer */
  .cart-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    z-index:100;opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .cart-overlay.open{opacity:1;pointer-events:auto;}

  .cart-drawer{
    position:fixed;top:0;right:0;bottom:0;
    width:380px;max-width:100vw;
    background:var(--panel);border-left:2px solid var(--line);
    z-index:110;
    display:flex;flex-direction:column;
    transform:translateX(105%);
    transition:transform .3s cubic-bezier(.22,1,.36,1);
    box-shadow:-10px 0 40px rgba(0,0,0,.6);
  }
  .cart-drawer.open{transform:translateX(0);}

  .cart-header{
    padding:14px 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
  }
  .cart-header h3{margin:0;font-size:11px;letter-spacing:1px;}
  .cart-header .close-cart{
    background:none;border:none;color:var(--pink-dim);
    font-family:'JetBrains Mono',monospace;font-size:14px;cursor:pointer;
    padding:0 2px;
  }
  .cart-header .close-cart:hover{color:var(--pink);}

  .cart-body{
    flex:1;overflow-y:auto;padding:12px 18px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  }
  .cart-body .empty-cart{text-align:center;padding:30px 0;font-size:10px;color:var(--muted);}

  .cart-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:6px 0;border-bottom:1px dotted rgba(31,46,32,.4);
    font-size:11px;gap:8px;
  }
  .cart-item .cinfo{flex:1;}
  .cart-item .cname{color:var(--green);}
  .cart-item .cqty{color:var(--muted);}
  .cart-item .cprice{color:var(--green-dim);white-space:nowrap;}
  .cart-item .cremove{
    color:var(--pink-dim);cursor:pointer;font-size:14px;line-height:1;
    transition:color .15s;
  }
  .cart-item .cremove:hover{color:var(--pink);}

  .cart-total{
    display:flex;justify-content:space-between;
    padding:10px 0 4px;font-size:13px;font-weight:500;
    border-top:1px solid var(--line);margin-top:6px;
  }

  .cart-footer{
    padding:12px 18px 18px;
    border-top:1px solid var(--line);
  }

  /* Checkout form (inside cart) */
  .checkout-form{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
  .checkout-form input, .checkout-form select{
    padding:8px 10px;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;
    color:var(--green);font-family:'JetBrains Mono',monospace;font-size:11px;
    outline:none;width:100%;
  }
  .checkout-form input:focus{border-color:var(--green-dim);}
  .checkout-form input::placeholder{color:var(--muted);}
  .type-radio{display:flex;gap:14px;font-size:10px;color:var(--green-dim);}
  .type-radio label{cursor:pointer;display:flex;align-items:center;gap:4px;}
  .type-radio input{accent-color:var(--green);width:auto;}

  .place-btn{
    width:100%;padding:10px;
    background:var(--green);color:var(--bg);border:none;border-radius:6px;
    font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;
    letter-spacing:1px;
    transition:background .15s;
  }
  .place-btn:hover{background:var(--green-dim);}
  .place-btn:disabled{opacity:.4;cursor:not-allowed;}

  /* Confirmation receipt */
  .confirmation{
    background:var(--paper);color:var(--paper-ink);
    border-radius:2px;padding:16px 18px;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
    animation:print .35s ease-out;
  }
  .confirmation .conftitle{font-weight:700;font-size:14px;margin-bottom:6px;}
  .confirmation .confdetail{font-size:11px;line-height:1.7;}
  @keyframes print{from{transform:scaleY(.2);opacity:0}to{transform:scaleY(1);opacity:1}}
  @media(prefers-reduced-motion:reduce){.confirmation{animation:none}}

  .loading{text-align:center;padding:40px 0;font-size:10px;color:var(--green-dim);letter-spacing:1px;}
  .error{text-align:center;padding:40px 0;font-size:10px;color:var(--pink-dim);}

  @media(max-width:500px){
    body{padding:12px;}
    .cart-drawer{width:100vw;}
    .mitem .mdesc{white-space:normal;}
  }
</style>
</head>
<body>

<div class="page">
  <div class="hdr">
    <div class="brand">DEBS <span>ONLINE ORDERING</span></div>
    <div class="cart-icon" id="cartIcon">
      CART <span class="badge" id="cartCount">0</span>
    </div>
  </div>

  <div class="cats" id="catTabs"></div>
  <div class="items" id="items"></div>
  <div class="loading" id="loading">LOADING MENU...</div>
</div>

<!-- Cart drawer -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3>YOUR ORDER</h3>
    <button class="close-cart" id="closeCart">✕</button>
  </div>
  <div class="cart-body" id="cartBody">
    <div class="empty-cart">◆ your cart is empty</div>
  </div>
  <div class="cart-footer" id="cartFooter">
    <div class="checkout-form" id="checkoutForm">
      <input type="text" id="custName" placeholder="your name" />
      <input type="text" id="custPhone" placeholder="phone number" />
      <div class="type-radio">
        <label><input type="radio" name="orderType" value="pickup" checked /> Pickup</label>
        <label><input type="radio" name="orderType" value="delivery" /> Delivery</label>
      </div>
    </div>
    <button class="place-btn" id="placeBtn">PLACE ORDER</button>
    <div id="confirmationArea" style="margin-top:10px;"></div>
  </div>
</div>

<script>
// ---- State ----
let menuData = null;
let cart = []; // { menu_item_id, name, unit_price, quantity }
let activeCategory = null;

// ---- DOM refs ----
const catTabs = document.getElementById('catTabs');
const itemsEl = document.getElementById('items');
const loadingEl = document.getElementById('loading');
const cartBody = document.getElementById('cartBody');
const cartFooter = document.getElementById('cartFooter');
const cartIcon = document.getElementById('cartIcon');
const cartCount = document.getElementById('cartCount');
const cartDrawer = document.getElementById('cartDrawer');
const cartOverlay = document.getElementById('cartOverlay');
const closeCart = document.getElementById('closeCart');
const placeBtn = document.getElementById('placeBtn');
const custName = document.getElementById('custName');
const custPhone = document.getElementById('custPhone');
const confirmationArea = document.getElementById('confirmationArea');

// ---- Load menu ----
async function loadMenu(){
  try {
    const res = await fetch('/api/menu');
    const data = await res.json();
    menuData = data.categories || {};
    const keys = Object.keys(menuData);
    if (keys.length) activeCategory = keys[0];
    renderTabs();
    renderItems();
    loadingEl.style.display = 'none';
  } catch(e){
    loadingEl.textContent = '⚠ FAILED TO LOAD MENU';
    loadingEl.className = 'error';
  }
}

function renderTabs(){
  catTabs.innerHTML = Object.keys(menuData).map(c =>
    `<div class="cat-tab ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c.toUpperCase()}</div>`
  ).join('');
}

function renderItems(){
  if (!activeCategory || !menuData[activeCategory]) { itemsEl.innerHTML = ''; return; }
  itemsEl.innerHTML = menuData[activeCategory].map(item => itemHtml(item)).join('');
}

function itemHtml(item){
  const inCart = cart.find(c => c.menu_item_id === item.id);
  const qty = inCart ? inCart.quantity : 0;

  const tags = [];
  if (item.vegetarian) tags.push('<span class="mtag">V</span>');
  if (item.vegan) tags.push('<span class="mtag">VG</span>');

  return `<div class="mitem" data-id="${item.id}">
    <div class="minfo">
      <div class="mname">${esc(item.name)} <span class="mtags">${tags.join('')}</span></div>
      <div class="mdesc">${esc(item.description || '')}</div>
    </div>
    <div class="mprice">$${item.price.toFixed(2)}</div>
    <div class="qty-ctl">
      ${qty > 0
        ? ` <button class="dec-btn" data-id="${item.id}">−</button>
            <span class="qty">${qty}</span>
            <button class="inc-btn" data-id="${item.id}">+</button>`
        : `<button class="add-btn" data-id="${item.id}">+</button>`
      }
    </div>
  </div>`;
}

// ---- Cart operations ----
function addToCart(menuItemId){
  const item = findMenuItem(menuItemId);
  if (!item) return;
  const existing = cart.find(c => c.menu_item_id === menuItemId);
  if (existing) { existing.quantity++; } else {
    cart.push({ menu_item_id: item.id, name: item.name, unit_price: item.price, quantity: 1 });
  }
  updateUI();
}

function removeFromCart(menuItemId){
  const existing = cart.find(c => c.menu_item_id === menuItemId);
  if (!existing) return;
  if (existing.quantity > 1) { existing.quantity--; } else {
    cart = cart.filter(c => c.menu_item_id !== menuItemId);
  }
  updateUI();
}

function findMenuItem(id){
  if (!menuData) return null;
  for (const items of Object.values(menuData)){
    const found = items.find(i => i.id === id);
    if (found) return found;
  }
  return null;
}

function cartTotal(){
  return cart.reduce((sum, c) => sum + c.unit_price * c.quantity, 0);
}

function cartItemCount(){
  return cart.reduce((sum, c) => sum + c.quantity, 0);
}

function updateUI(){
  // Update item displays
  renderItems();

  // Update cart icon
  const count = cartItemCount();
  cartCount.textContent = count;
  cartCount.style.display = count ? 'inline' : 'none';

  // Update cart body
  renderCart();
}

function renderCart(){
  if (!cart.length){
    cartBody.innerHTML = '<div class="empty-cart">◆ your cart is empty</div>';
    const total = document.querySelector('.cart-total');
    document.getElementById('checkoutForm').style.display = 'block';
    placeBtn.style.display = 'block';
    placeBtn.disabled = true;
    confirmationArea.innerHTML = '';
    return;
  }

  const itemsHtml = cart.map(c =>
    `<div class="cart-item">
      <div class="cinfo">
        <div class="cname">${esc(c.name)} <span class="cqty">×${c.quantity}</span></div>
      </div>
      <div class="cprice">$${(c.unit_price * c.quantity).toFixed(2)}</div>
      <span class="cremove" data-id="${c.menu_item_id}">✕</span>
    </div>`
  ).join('');

  cartBody.innerHTML = itemsHtml + `
    <div class="cart-total">
      <span>TOTAL</span>
      <span>$${cartTotal().toFixed(2)}</span>
    </div>
  `;

  document.getElementById('checkoutForm').style.display = 'block';
  placeBtn.style.display = 'block';
  placeBtn.disabled = false;
  confirmationArea.innerHTML = '';
}

// ---- Events ----
// Category tabs
catTabs.addEventListener('click', (e) => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  activeCategory = tab.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderItems();
});

// Item add/dec/inc
itemsEl.addEventListener('click', (e) => {
  const addBtn = e.target.closest('.add-btn');
  if (addBtn) { addToCart(addBtn.dataset.id); return; }
  const incBtn = e.target.closest('.inc-btn');
  if (incBtn) { addToCart(incBtn.dataset.id); return; }
  const decBtn = e.target.closest('.dec-btn');
  if (decBtn) { removeFromCart(decBtn.dataset.id); return; }
});

// Remove from cart
cartBody.addEventListener('click', (e) => {
  const rm = e.target.closest('.cremove');
  if (!rm) return;
  cart = cart.filter(c => c.menu_item_id !== rm.dataset.id);
  updateUI();
});

// Cart drawer
function openCart(){ cartDrawer.classList.add('open'); cartOverlay.classList.add('open'); }
function closeCartDrawer(){ cartDrawer.classList.remove('open'); cartOverlay.classList.remove('open'); }
cartIcon.addEventListener('click', openCart);
closeCart.addEventListener('click', closeCartDrawer);
cartOverlay.addEventListener('click', closeCartDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCartDrawer(); });

// ---- Place order ----
placeBtn.addEventListener('click', async () => {
  try {
    const name = (document.getElementById('custName').value || '').trim();
    const phone = (document.getElementById('custPhone').value || '').trim();
    const radio = document.querySelector('input[name="orderType"]:checked');
    const orderType = radio ? radio.value : 'pickup';

    if (!name || !phone || !cart.length){
      alert('Please fill in your name, phone number, and add items to cart.');
      return;
    }

    placeBtn.disabled = true;
    placeBtn.textContent = 'PLACING...';

    // Timeout: don't let fetch hang forever
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        customer_name: name,
        phone_number: phone,
        order_type: orderType,
        items: cart.map(c => ({ menu_item_id: c.menu_item_id, quantity: c.quantity })),
      }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);

    if (!res.ok){
      const errText = await res.text();
      throw new Error(res.status + ': ' + errText);
    }

    const data = await res.json();
    if (!data.success){
      throw new Error(data.reason || 'Order was not accepted');
    }

    // Success!
    document.getElementById('checkoutForm').style.display = 'none';
    placeBtn.style.display = 'none';
    confirmationArea.innerHTML = `
      <div class="confirmation">
        <div class="conftitle">&#10003; ORDER PLACED</div>
        <div class="confdetail">
          Order #${esc(data.short_id)}<br>
          Total: $${Number(data.total_price).toFixed(2)}<br>
          Ready in ~${data.estimated_ready_minutes} min<br><br>
          <span style="font-size:10px;color:#888;">Check status at <b>debs/order-lookup</b></span>
        </div>
      </div>
    `;
    cart = [];
    updateUI();
  } catch(e){
    console.error('Place order error:', e);
    placeBtn.disabled = false;
    placeBtn.textContent = 'PLACE ORDER';
    alert('Failed: ' + e.message);
  }
});

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Init
loadMenu();
</script>
</body>
</html>
